name: Savannah Platform CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Codebase
        run: npm run lint

      - name: Run Unit Tests
        run: npm test -- --run

      - name: Build Production Bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PLATFORM_URL: "https://tmsavannah.com"

  # Optional: Automatic deployment to Vercel/Netlify can be added here
  # deploy:
  #   needs: build-and-test
  #   ...
